name: Remote Proto Generation

on:
  push:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo A (Protos)
        uses: actions/checkout@v3

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Protoc and Plugins
        run: |
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate Code
        run: |
          mkdir -p gen/go
         
          protoc --proto_path=proto \
            --go_out=gen/go --go_opt=paths=source_relative \
            --go-grpc_out=gen/go --go-grpc_opt=paths=source_relative \
            proto/*.proto

      - name: Push to Repository B (Generated)
        env:
          GH_TOKEN: ${{ secrets.PROTO_GEN_TOKEN }}
        run: |
          
          git clone https://x-access-token:${GH_TOKEN}@github.com/erooohaaa/orders-generated.git repo-b
          
          
          rm -rf repo-b/*
          cp -r gen/go/* repo-b/
          
         
          cd repo-b
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-generated gRPC code from orders-proto" || echo "No changes"
          git push origin master